name: Deploy to GitHub Pages

# Runs on every push to main, or can be triggered manually
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Inject secrets from GitHub into app.js at build time.
      # Required GitHub Secrets:
      #   FIREBASE_CONFIG   — full JSON config object from Firebase (apiKey, databaseURL, etc.)
      #   SUPER_ADMIN_EMAIL — email address of the super-admin account (never committed to source)
      - name: Inject build-time secrets
        run: python3 inject_config.py
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          SUPER_ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}

      # Deploy the processed files to the gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,inject_config.py,functions,firebase.json,.firebaserc,database.rules.json,FRESHBOOKS_SETUP.md,import-clients.html'
