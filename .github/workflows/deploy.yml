name: Deploy to GitHub Pages

# Runs on every push to main, or can be triggered manually
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Inject the Firebase config from the GitHub Secret.
      # The secret FIREBASE_CONFIG must contain the full JSON config object,
      # e.g.: {"apiKey":"AIza...","authDomain":"...","databaseURL":"...","projectId":"...","storageBucket":"...","messagingSenderId":"...","appId":"...","measurementId":"..."}
      - name: Inject Firebase config
        run: python3 inject_config.py
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}

      # Deploy the processed files to the gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,inject_config.py,functions,firebase.json,.firebaserc,FRESHBOOKS_SETUP.md'
