name: Deploy to GitHub Pages

# Runs on every push to main, or can be triggered manually
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build: copy only whitelisted front-end files into dist/
      - name: Build dist (whitelist)
        run: bash build.sh

      # Inject Firebase config from the GitHub Secret into dist/app.js.
      # Required GitHub Secret:
      #   FIREBASE_CONFIG — full JSON config object from Firebase (apiKey, databaseURL, etc.)
      - name: Inject Firebase config into dist/app.js
        run: python3 inject_config.py
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}

      # Deploy the processed files to the gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
